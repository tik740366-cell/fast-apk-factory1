<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katkout AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col items-center p-6 font-sans text-right">
    <div class="w-full max-w-md bg-slate-800 p-6 rounded-3xl shadow-2xl border border-slate-700 mt-10">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-blue-500 tracking-tight">KATKOUT AI</h1>
            <p class="text-slate-400 text-xs mt-2">اصنع صوراً احترافية بالذكاء الاصطناعي</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-blue-400 mb-2 font-bold uppercase tracking-wider">وصف الصورة</label>
                <textarea id="prompt" class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:ring-2 focus:ring-blue-500 outline-none h-32 resize-none text-white placeholder-slate-600" 
                    placeholder="مثلاً: رائد فضاء يركب جملاً في الغروب..."></textarea>
            </div>
            
            <button onclick="generate()" id="btn" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold shadow-lg shadow-blue-900/20 transition-all active:scale-95">
                توليد الصورة الآن
            </button>
        </div>

        <div id="result" class="mt-8 hidden">
            <div class="p-2 bg-slate-700 rounded-2xl border border-slate-600 overflow-hidden shadow-inner">
                <img id="ai-img" class="w-full rounded-xl" src="">
            </div>
            <p class="text-center text-[10px] text-slate-500 mt-4 italic">تم التوليد بواسطة محرك Pollinations</p>
        </div>
    </div>

    <script>
        function generate() {
            const prompt = document.getElementById('prompt').value;
            const btn = document.getElementById('btn');
            if(!prompt) return alert("عفاك اكتب شي وصف أولاً!");

            btn.disabled = true;
            btn.innerText = "جاري التوليد... ⏳";
            
            const seed = Math.floor(Math.random() * 999999);
            const url = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&seed=${seed}`;
            const img = document.getElementById('ai-img');
            
            img.src = url;
            img.onload = () => {
                document.getElementById('result').classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "توليد الصورة الآن";
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
